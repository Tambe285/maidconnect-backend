<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Workers - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold text-xl">M</div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">MaidConnect</h1>
                    <p class="text-sm text-gray-500">Verified Workers</p>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <span id="userName" class="text-gray-700 font-medium hidden md:block"></span>
                <a href="/my-bookings" class="text-blue-600 hover:text-blue-700 font-semibold">My Bookings</a>
                <button onclick="logout()" class="text-red-500 hover:text-red-600 font-semibold">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-3xl font-bold text-gray-900 mb-6">Available Workers</h2>
        
        <!-- Workers Grid -->
        <div id="workersGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Workers will be loaded here -->
        </div>
        
        <!-- Loading State -->
        <div id="loading" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
            <p class="mt-4 text-gray-500">Loading workers...</p>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-900">Book Service</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>            
            <div id="modalContent">
                <p class="text-gray-600 mb-4">Booking with: <span id="modalWorkerName" class="font-bold text-orange-600"></span></p>
                
                <form id="bookingForm" class="space-y-4">
                    <input type="hidden" id="workerId">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Service Type</label>
                        <select id="serviceType" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                            <option value="cooking">Cooking</option>
                            <option value="cleaning">Cleaning</option>
                            <option value="babysitting">Babysitting</option>
                            <option value="eldercare">Elder Care</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                            <input type="date" id="bookingDate" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Time</label>
                            <input type="time" id="bookingTime" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Duration (Hours)</label>
                        <input type="number" id="duration" value="2" min="1" max="12" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    </div>
                    
                    <button type="submit" id="bookBtn" class="w-full bg-orange-500 text-white py-3 rounded-lg font-bold hover:bg-orange-600 transition">
                        Confirm Booking
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let customer = JSON.parse(localStorage.getItem('customer'));

        // Auth Check
        if (!customer) {
            window.location.href = '/customer-login';
        } else {
            document.getElementById('userName').textContent = customer.full_name;
        }
        // Set min date to today
        document.getElementById('bookingDate').min = new Date().toISOString().split('T')[0];

        // Fetch Workers
        async function loadWorkers() {
            try {
                const res = await fetch('/api/customers/workers');
                const data = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                const grid = document.getElementById('workersGrid');
                
                if (data.workers.length === 0) {
                    grid.innerHTML = '<p class="col-span-3 text-center text-gray-500 py-12">No workers available yet. Check back soon!</p>';
                    return;
                }

                data.workers.forEach(worker => {
                    const card = `
                        <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden hover:shadow-lg transition">
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 class="text-xl font-bold text-gray-900">${worker.full_name}</h3>
                                        <p class="text-sm text-gray-500">${worker.experience_years} years exp. • ${worker.preferred_location}</p>
                                    </div>
                                    <span class="bg-green-100 text-green-800 text-xs font-bold px-2 py-1 rounded-full">
                                        ⭐ ${worker.average_rating || 'New'}
                                    </span>
                                </div>
                                
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${worker.skills.map(s => `<span class="bg-orange-50 text-orange-700 text-xs px-2 py-1 rounded-md">${s}</span>`).join('')}
                                </div>
                                
                                <p class="text-gray-600 text-sm mb-4">${worker.availability || 'Flexible availability'}</p>
                                
                                <button onclick="openBookingModal(${worker.id}, '${worker.full_name}')" class="w-full bg-orange-500 text-white py-2 rounded-lg font-semibold hover:bg-orange-600 transition">
                                    Book Now
                                </button>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Failed to load workers. Please try again.</p>';
            }        }

        function openBookingModal(workerId, workerName) {
            document.getElementById('workerId').value = workerId;
            document.getElementById('modalWorkerName').textContent = workerName;
            document.getElementById('bookingModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('bookingModal').classList.add('hidden');
            document.getElementById('bookingForm').reset();
        }

        document.getElementById('bookingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('bookBtn');
            btn.disabled = true;
            btn.textContent = 'Booking...';

            const bookingData = {
                customer_id: customer.id,
                worker_id: document.getElementById('workerId').value,
                booking_date: document.getElementById('bookingDate').value,
                booking_time: document.getElementById('bookingTime').value,
                service_type: document.getElementById('serviceType').value,
                duration_hours: parseInt(document.getElementById('duration').value),
                notes: ''
            };

            try {
                const res = await fetch('/api/customers/bookings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(bookingData)
                });

                const data = await res.json();
                
                if (data.success) {
                    alert('Booking Confirmed! The worker will be notified.');
                    closeModal();
                    // Optionally redirect to My Bookings
                    // window.location.href = '/my-bookings';
                } else {
                    alert('Error: ' + data.error);
                    btn.disabled = false;
                    btn.textContent = 'Confirm Booking';
                }
            } catch (error) {                console.error('Error:', error);
                alert('Failed to book. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Confirm Booking';
            }
        });

        function logout() {
            localStorage.removeItem('customer');
            window.location.href = '/customer-login';
        }

        // Load workers on page load
        loadWorkers();
    </script>
</body>
</html>
