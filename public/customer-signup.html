<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-200 w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Create Account</h1>
        <form id="signupForm" class="space-y-4">
            <input type="text" id="full_name" placeholder="Full Name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            <input type="tel" id="phone" placeholder="Phone Number" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            <input type="text" id="address" placeholder="Address" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
            <input type="text" id="city" placeholder="City" class="w-full px-4 py-3 border border-gray-300 rounded-lg">
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">Sign Up</button>
        </form>
        <p class="text-center mt-4 text-sm text-gray-600">Already have an account? <a href="/customer-login" class="text-blue-600">Login</a></p>
    </div>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payload = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value
            };
            try {
                const res = await fetch('/api/customers/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) {
                    alert('Success! Please login.');
                    window.location.href = '/customer-login';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) { alert('Failed to connect'); }
        });
    </script>
</body>
</html>
