<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Signup - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { orange: '#F97316', dark: '#111111', light: '#F3F0EB' }
                    },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-brand-light/5 border border-white/10 rounded-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="font-serif text-3xl font-bold mb-2">Business Signup</h1>
            <p class="text-gray-400 text-sm">Complete your details to get started</p>
        </div>

        <form id="signupForm" class="space-y-4">
            <!-- Selected Plan (Auto-filled from URL) -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Selected Plan</label>
                <input type="text" id="selectedPlan" readonly class="w-full bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 text-brand-orange font-bold focus:outline-none">
            </div>

            <!-- Business Name -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Business Name</label>
                <input type="text" id="businessName" required placeholder="e.g., Sharma Hotel & Resorts" class="w-full bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-orange">
            </div>

            <!-- Business Type -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Business Type</label>
                <select id="businessType" required class="w-full bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-orange">
                    <option value="" class="bg-brand-dark">Select Type</option>
                    <option value="Shop" class="bg-brand-dark">🏪 Shop</option>
                    <option value="Restaurant" class="bg-brand-dark">🍽️ Restaurant</option>
                    <option value="Hotel" class="bg-brand-dark">🏨 Hotel</option>                    <option value="Mall" class="bg-brand-dark">🛍️ Mall</option>
                    <option value="Showroom" class="bg-brand-dark">✨ Showroom</option>
                    <option value="Company" class="bg-brand-dark">🏢 Company</option>
                    <option value="Household" class="bg-brand-dark">🏠 Household</option>
                </select>
            </div>

            <!-- Contact Name -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Contact Person</label>
                <input type="text" id="contactName" required placeholder="Full Name" class="w-full bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-orange">
            </div>

            <!-- Email & Phone -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                    <input type="email" id="email" required placeholder="you@business.com" class="w-full bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-orange">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Phone</label>
                    <input type="tel" id="phone" required placeholder="9876543210" class="w-full bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-orange">
                </div>
            </div>

            <!-- Promoter Code (Optional) -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Promoter Code (Optional)</label>
                <input type="text" id="promoterCode" placeholder="If referred by a promoter" class="w-full bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand-orange">
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-brand-orange hover:bg-orange-600 text-white font-bold py-3 rounded-lg transition mt-6">
                Submit Application
            </button>
        </form>

        <!-- Success/Error Message -->
        <div id="message" class="hidden mt-4 p-3 rounded-lg text-center text-sm"></div>

        <div class="mt-6 text-center">
            <a href="/business-plans" class="text-gray-400 hover:text-white text-sm">← Back to Plans</a>
        </div>
    </div>

    <script>
        // Get plan from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan') || 'Starter';
        document.getElementById('selectedPlan').value = plan;
        // Handle Form Submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            
            btn.textContent = 'Submitting...';
            btn.disabled = true;

            const data = {
                name: document.getElementById('contactName').value,
                phone: document.getElementById('phone').value,
                service: document.getElementById('businessType').value,
                email: document.getElementById('email').value,
                business_name: document.getElementById('businessName').value,
                plan: plan,
                promoter_code: document.getElementById('promoterCode').value || null
            };

            try {
                const res = await fetch('/api/waitlist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    msg.className = 'mt-4 p-3 rounded-lg text-center text-sm bg-green-900/30 text-green-400 border border-green-500/30';
                    msg.innerHTML = '✅ Application submitted successfully! We will contact you within 24 hours.';
                    msg.classList.remove('hidden');
                    e.target.reset();
                } else {
                    throw new Error(result.error || 'Submission failed');
                }
            } catch (error) {
                msg.className = 'mt-4 p-3 rounded-lg text-center text-sm bg-red-900/30 text-red-400 border border-red-500/30';
                msg.innerHTML = '❌ Error: ' + error.message;
                msg.classList.remove('hidden');
            } finally {
                btn.textContent = 'Submit Application';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
