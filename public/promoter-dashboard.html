<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoter Dashboard - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { orange: '#F97316', dark: '#111827' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Header -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand-orange rounded-full flex items-center justify-center text-white font-bold text-xl">M</div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">MaidConnect</h1>
                    <p class="text-sm text-gray-500">Promoter Dashboard</p>
                </div>
            </div>
            <a href="/" class="text-gray-600 hover:text-gray-900">← Back to Home</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Stats Cards -->
        <div class="grid md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Total Referrals</p>
                <p class="text-3xl font-bold text-gray-900" id="totalReferrals">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Successful</p>
                <p class="text-3xl font-bold text-green-600" id="successfulReferrals">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Pending</p>                <p class="text-3xl font-bold text-yellow-600" id="pendingReferrals">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Total Earnings</p>
                <p class="text-3xl font-bold text-orange-600" id="totalEarnings">₹0</p>
            </div>
        </div>

        <!-- Referral Code -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600 rounded-2xl p-8 mb-8 text-white">
            <h2 class="text-2xl font-bold mb-2">Your Referral Code</h2>
            <p class="text-orange-100 mb-4">Share this code with businesses to earn commission</p>
            <div class="bg-white bg-opacity-20 backdrop-blur-sm p-6 rounded-xl text-center">
                <p id="promoterCode" class="text-4xl font-bold tracking-wider"></p>
            </div>
        </div>

        <!-- Referrals Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">Your Referrals</h2>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Business</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Contact</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Payment Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Commission</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="referralsTable">
                        <tr>
                            <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                <div class="flex justify-center items-center gap-2">
                                    <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-brand-orange"></div>
                                    Loading referrals...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        // Get promoter code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const promoterCode = urlParams.get('code');

        if (!promoterCode) {
            alert('No promoter code found. Please register first.');
            window.location.href = '/promoter-signup';
        }

        document.getElementById('promoterCode').textContent = promoterCode;

        // Load dashboard data
        async function loadDashboard() {
            try {
                const res = await fetch(`/api/promoter/dashboard/${promoterCode}`);
                const data = await res.json();

                if (data.success) {
                    displayDashboard(data.promoter, data.referrals);
                } else {
                    alert('Error loading dashboard: ' + data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('referralsTable').innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-red-500">
                            Error loading dashboard. <button onclick="loadDashboard()" class="underline">Retry</button>
                        </td>
                    </tr>
                `;
            }
        }

        function displayDashboard(promoter, referrals) {
            // Update stats
            document.getElementById('totalReferrals').textContent = promoter.totalReferrals || 0;
            document.getElementById('successfulReferrals').textContent = promoter.successfulReferrals || 0;
            document.getElementById('pendingReferrals').textContent = promoter.pendingReferrals || 0;
            document.getElementById('totalEarnings').textContent = `₹${promoter.totalEarnings || 0}`;

            // Display referrals
            const tbody = document.getElementById('referralsTable');
            
            if (referrals.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                            No referrals yet. Share your code to start earning!                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = referrals.map(ref => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-gray-900">${ref.business_name || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-900">${ref.business_email || 'N/A'}</div>
                        <div class="text-sm text-gray-500">${ref.business_phone || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-medium ${
                            ref.payment_status === 'paid' ? 'bg-green-100 text-green-800' :
                            ref.payment_status === 'pending' ? 'bg-yellow-100 text-yellow-800' :
                            'bg-gray-100 text-gray-800'
                        } rounded capitalize">
                            ${ref.payment_status || 'N/A'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm font-medium text-gray-900">
                            ${ref.commission_amount ? `₹${ref.commission_amount}` : '₹0'}
                        </div>
                        <div class="text-xs text-gray-500">5% commission</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-medium ${
                            ref.status === 'paid' ? 'bg-green-100 text-green-800' :
                            'bg-yellow-100 text-yellow-800'
                        } rounded capitalize">
                            ${ref.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">
                        ${new Date(ref.created_at).toLocaleDateString('en-IN', { 
                            day: 'numeric', 
                            month: 'short', 
                            year: 'numeric'
                        })}
                    </td>
                </tr>
            `).join('');
        }

        // Load on page load        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
