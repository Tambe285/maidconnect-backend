<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-200 w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Welcome Back</h1>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="Email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">Login</button>
        </form>
        <p class="text-center mt-4 text-sm text-gray-600">New here? <a href="/customer-signup" class="text-blue-600">Sign Up</a></p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const payload = { email: document.getElementById('email').value, password: document.getElementById('password').value };
            try {
                const res = await fetch('/api/customers/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('customer', JSON.stringify(data.customer));
                    window.location.href = '/browse-workers';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) { alert('Failed to connect'); }
        });
    </script>
</body>
</html>
