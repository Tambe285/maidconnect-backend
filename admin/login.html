<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MaidConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { orange: '#F97316', dark: '#111827', card: '#1F2937' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-brand-card p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-700">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400">Admin Login</h1>
            <p class="text-gray-400 text-sm mt-1">MaidConnect Management Portal</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
                <input type="text" id="username" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-400" placeholder="admin">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-400" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-lg transition">Login</button>
        </form>

        <div id="message" class="hidden mt-4 p-3 rounded-lg text-center text-sm"></div>

        <div class="mt-6 text-center">
            <a href="/" class="text-gray-400 hover:text-orange-400 text-sm">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const msg = document.getElementById('message');
            
            btn.textContent = 'Logging in...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    msg.className = 'mt-4 p-3 rounded-lg text-center text-sm bg-green-900/30 text-green-400 border border-green-500/30';
                    msg.innerHTML = '✅ Login successful! Redirecting...';
                    msg.classList.remove('hidden');
                    setTimeout(() => window.location.href = '/admin/dashboard?token=' + data.token, 1000);
                } else {
                    throw new Error(data.error || 'Invalid credentials');
                }
            } catch (err) {
                msg.className = 'mt-4 p-3 rounded-lg text-center text-sm bg-red-900/30 text-red-400 border border-red-500/30';
                msg.innerHTML = '❌ ' + err.message;
                msg.classList.remove('hidden');
            } finally {
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
