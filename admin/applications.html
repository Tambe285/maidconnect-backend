<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Applications - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { orange: '#F97316', dark: '#111111', light: '#F3F0EB' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-white font-bold text-xl">M</div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">MaidConnect Admin</h1>
                    <p class="text-sm text-gray-500">Business Applications</p>
                </div>
            </div>
            <div class="flex gap-4">
                <a href="/admin/dashboard" class="px-4 py-2 text-gray-600 hover:text-gray-900">Dashboard</a>
                <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">

        <div class="grid md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Total Applications</p>
                <p class="text-3xl font-bold text-gray-900" id="totalApps">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Starter Plans</p>
                <p class="text-3xl font-bold text-orange-500" id="starterPlans">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Business Plans</p>
                <p class="text-3xl font-bold text-blue-500" id="businessPlans">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Enterprise Plans</p>
                <p class="text-3xl font-bold text-purple-500" id="enterprisePlans">-</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-900">Recent Applications</h2>
                <button onclick="loadApplications()" class="px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 text-sm font-medium">
                    Refresh
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Business</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Contact</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Plan</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="applicationsTable">
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                <div class="flex justify-center items-center gap-2">
                                    <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-orange-500"></div>
                                    Loading applications...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
            localStorage.setItem('adminToken', urlToken);
            window.history.replaceState({}, '', '/admin/applications');
        }

        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin';
        }

        document.addEventListener('DOMContentLoaded', loadApplications);

        async function loadApplications() {
            try {
                const res = await fetch('/api/admin/business-applications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    localStorage.removeItem('adminToken');
                    window.location.href = '/admin';
                    return;
                }

                const data = await res.json();

                if (data.success) {
                    displayApplications(data.applications);
                    updateStats(data.applications);
                }
            } catch (error) {
                console.error('Error loading applications:', error);
                document.getElementById('applicationsTable').innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-red-500">
                            Error loading data. <button onclick="loadApplications()" class="underline">Retry</button>
                        </td>
                    </tr>
                `;
            }
        }

        function updateStats(apps) {
            document.getElementById('totalApps').textContent = apps.length;
            document.getElementById('starterPlans').textContent = apps.filter(a => a.plan === 'Starter').length;
            document.getElementById('businessPlans').textContent = apps.filter(a => a.plan === 'Business').length;
            document.getElementById('enterprisePlans').textContent = apps.filter(a => a.plan === 'Enterprise').length;
        }

        function displayApplications(apps) {
            const tbody = document.getElementById('applicationsTable');

            if (apps.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-500">No applications yet</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = apps.map(app => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <div class="font-medium text-gray-900">${app.business_name || 'N/A'}</div>
                        <div class="text-sm text-gray-500">${app.name}</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">
                        <div>${app.email || '-'}</div>
                        <div>${app.phone || '-'}</div>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">${app.service || '-'}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-medium bg-blue-100 text-blue-800 rounded">${app.plan || 'Starter'}</span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-medium rounded ${
                            app.status === 'approved' ? 'bg-green-100 text-green-800' :
                            app.status === 'rejected' ? 'bg-red-100 text-red-800' :
                            'bg-yellow-100 text-yellow-800'
                        }">${app.status || 'pending'}</span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">${new Date(app.created_at).toLocaleDateString()}</td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2">
                            <button onclick="updateStatus(${app.id}, 'approved')" class="px-3 py-1 bg-green-500 text-white text-xs rounded hover:bg-green-600">Approve</button>
                            <button onclick="updateStatus(${app.id}, 'rejected')" class="px-3 py-1 bg-red-500 text-white text-xs rounded hover:bg-red-600">Reject</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            try {
                const res = await fetch(`/api/admin/applications/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                const data = await res.json();
                if (data.success) {
                    loadApplications();
                }
            } catch (error) {
                console.error('Error updating status:', error);
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin';
        }
    </script>
</body>
</html>
