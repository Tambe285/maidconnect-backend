<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Applications - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { orange: '#F97316', dark: '#111111', light: '#F3F0EB' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand-orange rounded-full flex items-center justify-center text-white font-bold text-xl">M</div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900">MaidConnect Admin</h1>
                    <p class="text-sm text-gray-500">Business Applications</p>
                </div>
            </div>
            <div class="flex gap-4">
                <a href="/admin/dashboard" class="px-4 py-2 text-gray-600 hover:text-gray-900">Dashboard</a>
                <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Stats -->
        <div class="grid md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Total Applications</p>
                <p class="text-3xl font-bold text-gray-900" id="totalApps">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">                <p class="text-sm text-gray-500 mb-1">Starter Plans</p>
                <p class="text-3xl font-bold text-orange-500" id="starterPlans">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Business Plans</p>
                <p class="text-3xl font-bold text-blue-500" id="businessPlans">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <p class="text-sm text-gray-500 mb-1">Enterprise Plans</p>
                <p class="text-3xl font-bold text-purple-500" id="enterprisePlans">-</p>
            </div>
        </div>

        <!-- Applications Table -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-gray-900">Recent Applications</h2>
                <button onclick="loadApplications()" class="px-4 py-2 bg-brand-orange text-white rounded-lg hover:bg-orange-600 text-sm font-medium">
                    Refresh
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Business</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Contact</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Plan</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="applicationsTable">
                        <tr>
                            <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                                <div class="flex justify-center items-center gap-2">
                                    <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-brand-orange"></div>
                                    Loading applications...
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        // Check authentication
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin';
        }

        // Load applications on page load
        document.addEventListener('DOMContentLoaded', loadApplications);

        async function loadApplications() {
            try {
                const res = await fetch('/api/admin/business-applications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 401) {
                    localStorage.removeItem('adminToken');
                    window.location.href = '/admin';
                    return;
                }

                const data = await res.json();
                
                if (data.success) {
                    displayApplications(data.applications);
                    updateStats(data.applications);
                }
            } catch (error) {
                console.error('Error loading applications:', error);
                document.getElementById('applicationsTable').innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-red-500">
                            Error loading applications. <button onclick="loadApplications()" class="underline">Retry</button>
                        </td>
                    </tr>
                `;
            }
        }

        function displayApplications(apps) {
            const tbody = document.getElementById('applicationsTable');
            
            if (apps.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-8 text-center text-gray-500">
                            No applications yet
                        </td>
                    </tr>                `;
                return;
            }

            tbody.innerHTML = apps.map(app => `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">
                        <div>
                            <div class="text-sm font-medium text-gray-900">${app.business_name || 'N/A'}</div>
                            <div class="text-sm text-gray-500">${app.name}</div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-900">${app.email || 'N/A'}</div>
                        <div class="text-sm text-gray-500">${app.phone}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-800 rounded">
                            ${app.service || app.business_type || 'N/A'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-medium ${getPlanBadgeColor(app.plan)} rounded">
                            ${app.plan || 'Starter'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 text-xs font-medium ${getStatusBadgeColor(app.status)} rounded">
                            ${app.status || 'pending'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-500">
                        ${new Date(app.created_at).toLocaleDateString('en-IN', { 
                            day: 'numeric', 
                            month: 'short', 
                            year: 'numeric'
                        })}
                    </td>
                    <td class="px-6 py-4 text-right">
                        ${getActionButtons(app)}
                    </td>
                </tr>
            `).join('');
        }

        function getActionButtons(app) {
            if (app.status === 'pending') {
                return `
                    <button onclick="updateStatus(${app.id}, 'approved')" class="text-green-600 hover:text-green-800 font-medium mr-3">Approve</button>
                    <button onclick="updateStatus(${app.id}, 'rejected')" class="text-red-600 hover:text-red-800 font-medium">Reject</button>                `;
            } else if (app.status === 'approved' && app.payment_status !== 'paid') {
                // Calculate amount based on plan
                let amount = 499; // Default Starter
                if (app.plan === 'Business') amount = 1499;
                else if (app.plan === 'Enterprise') amount = 4999;

                return `
                    <button onclick="generatePaymentLink(${app.id}, '${(app.business_name || '').replace(/'/g, "\\'")}', '${app.email}', ${amount})" class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-sm font-medium mr-2">Generate Payment Link</button>
                `;
            } else if (app.payment_status === 'paid') {
                return `<span class="px-2 py-1 bg-green-100 text-green-800 rounded text-xs font-medium">Paid ✓</span>`;
            } else {
                return `<span class="text-xs text-gray-500">Processed</span>`;
            }
        }

        function getPlanBadgeColor(plan) {
            switch(plan?.toLowerCase()) {
                case 'starter': return 'bg-orange-100 text-orange-800';
                case 'business': return 'bg-blue-100 text-blue-800';
                case 'enterprise': return 'bg-purple-100 text-purple-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function getStatusBadgeColor(status) {
            switch(status) {
                case 'approved': return 'bg-green-100 text-green-800';
                case 'rejected': return 'bg-red-100 text-red-800';
                default: return 'bg-yellow-100 text-yellow-800';
            }
        }

        function updateStats(apps) {
            document.getElementById('totalApps').textContent = apps.length;
            document.getElementById('starterPlans').textContent = apps.filter(a => a.plan === 'Starter').length;
            document.getElementById('businessPlans').textContent = apps.filter(a => a.plan === 'Business').length;
            document.getElementById('enterprisePlans').textContent = apps.filter(a => a.plan === 'Enterprise').length;
        }

        // Update Status Function
        async function updateStatus(id, newStatus) {
            if (!confirm(`Are you sure you want to mark this application as ${newStatus}?`)) return;

            try {
                const token = localStorage.getItem('adminToken');
                const res = await fetch(`/api/admin/applications/${id}`, {
                    method: 'PATCH',
                    headers: {                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const data = await res.json();
                if (data.success) {
                    alert(`Application ${newStatus} successfully!`);
                    loadApplications(); // Refresh table
                } else {
                    alert('Error updating status: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Failed to update status. Please try again.');
            }
        }

        // Generate Payment Link Function
        async function generatePaymentLink(id, businessName, email, amount) {
            const plan = amount === 499 ? 'Starter' : amount === 1499 ? 'Business' : 'Enterprise';
            
            if (!confirm(`Generate payment link for ₹${amount} (${plan} Plan)?`)) return;

            try {
                const token = localStorage.getItem('adminToken');
                const res = await fetch('/api/payment/generate-link', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        applicationId: id,
                        amount: amount,
                        plan: plan,
                        customerName: businessName,
                        customerEmail: email
                    })
                });

                const data = await res.json();
                
                if (data.success) {
                    // Copy link to clipboard
                    navigator.clipboard.writeText(data.paymentLink).then(() => {
                        alert(`Payment Link Generated!\n\nLink: ${data.paymentLink}\n\nLink copied to clipboard!\n\nSend this link to the business owner.`);
                    }).catch(() => {
                        alert(`Payment Link Generated:\n\n${data.paymentLink}\n\nPlease copy this link manually.`);                    });
                    loadApplications(); // Refresh table
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error generating payment link:', error);
                alert('Failed to generate payment link');
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin';
        }
    </script>
</body>
</html>
